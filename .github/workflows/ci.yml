name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'bugfix/**', 'hotfix/**']
    paths:
      - 'pricing-lake-ingestion/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'pricing-lake-ingestion/**'

env:
  PYTHON_VERSION: '3.12'
  WORKING_DIR: pricing-lake-ingestion

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt flake8
      - name: Flake8
        run: flake8 . --exclude=.venv --max-line-length=120 --extend-ignore=E501

  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check syntax
        run: |
          find . -name "*.py" -not -path "./.venv/*" | xargs python -m py_compile
          echo "Syntax OK"

  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [lint, syntax]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Syntax: ${{ needs.syntax.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.syntax.result }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed"
